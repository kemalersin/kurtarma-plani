name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Publish build to pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          touch dist/.nojekyll

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global http.postBuffer 524288000
          git config --global http.version HTTP/1.1

          workdir=$(mktemp -d)
          repo="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          if git clone --depth 1 --branch pages "$repo" "$workdir" 2>/dev/null; then
            echo "Existing pages branch cloned"
          else
            echo "Creating new pages branch"
            git init "$workdir"
            git -C "$workdir" checkout --orphan pages
            git -C "$workdir" remote add origin "$repo"
          fi

          rsync -a --delete --exclude='.git' dist/ "$workdir/"

          git -C "$workdir" add -A
          if git -C "$workdir" diff --staged --quiet; then
            echo "No changes to deploy"
            exit 0
          fi
          git -C "$workdir" commit -m "deploy: ${{ github.sha }}"

          for attempt in 1 2 3; do
            if git -C "$workdir" push origin HEAD:pages; then
              exit 0
            fi
            echo "Push failed (attempt ${attempt}/3), retrying..."
            sleep $((attempt * 15))
          done

          echo "Push failed after 3 attempts"
          exit 1
